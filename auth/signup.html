<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | StreetFood Connect</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; }
    .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px #ccc; width: 300px; }
    h2 { text-align: center; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; }
    input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: orange; border: none; color: white; cursor: pointer; font-size: 16px; }
    button:hover { background: darkorange; }
  </style>
</head>
<body>
<div class="container">
  <div class="box">
    <h2>Create an Account</h2>
    <form onsubmit="return signupUser()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit">Sign Up</button>
    </form>
    <p style="text-align:center;margin-top:10px;">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>
</div>

<script>
function signupUser() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!name || !email || !password) {
    alert("Please fill all fields");
    return false;
  }

  // Save permanent account details
  const user = { name, email, password };
  localStorage.setItem("streetfood_user", JSON.stringify(user));

  // Clear any previous session (user_role)
  localStorage.removeItem("user_role");

  alert("Account created successfully! Please login.");
  window.location.href = "login.html";
  return false; // prevent form submit
}
</script>

</body>
</html>
