<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | StreetFood Connect</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #fff, #f3f3f3);
    }
    .center-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    .box {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .box h2 { margin-bottom: 20px; color: #333; }
    .form-group { text-align: left; margin-bottom: 15px; }
    .form-group label { font-weight: bold; display:block; margin-bottom:5px; }
    .form-group input {
      width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;
    }
    .btn {
      background:#f4b942; border:none; padding:10px 20px;
      border-radius:20px; cursor:pointer; font-size:16px; margin-top:10px;
    }
    .btn:hover { background:#e0a832; }
    .role-buttons { display:none; margin-top:20px; }
    .role-buttons button { margin:10px; }
  </style>
</head>
<body>

<header>
  <div class="container header-content">
    <div class="logo"><i class="fas fa-utensils"></i><span>StreetFood Connect</span></div>
  </div>
</header>

<div class="center-container">
  <!-- Login form -->
  <div class="box" id="loginBox">
    <h2>Login</h2>
    <form onsubmit="return loginUser()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
  </div>

  <!-- Role selection after successful login -->
  <div class="box role-buttons" id="roleBox">
    <h2>Select your role</h2>
    <button class="btn" onclick="goToDashboard('customer')">Customer</button>
    <button class="btn" onclick="goToDashboard('supplier')">Supplier</button>
  </div>
</div>

<script>
function loginUser() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  const stored = localStorage.getItem("streetfood_user");
  if (!stored) {
    alert("No account found. Please sign up first.");
    return false;
  }

  const user = JSON.parse(stored);
  if (email === user.email && password === user.password) {
    // Credentials are valid, now show role selection
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('roleBox').style.display = 'block';
  } else {
    alert("Invalid email or password");
  }
  return false;
}

function goToDashboard(role) {
  // Set current session role (login state)
  localStorage.setItem("user_role", role);

  // Redirect based on chosen role
  if (role === 'customer') {
    window.location.href = "../dashboard/customer-dashboard.html";
  } else {
    window.location.href = "../dashboard/supplier-dashboard.html";
  }
}
</script>

</body>
</html>
