<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trusted Suppliers for India's Street Food Vendors</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/javascript/javascript.js"></script>
</head>

<body>
    <!-- Header -->
    <header>
        <div class="container header-content">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <span>StreetFood Connect</span>
            </div>
            <nav>
                <ul>
                    <li><a href="/home/home.html">Home</a></li>
                    <li><a href="/features/features.html">Features</a></li>
                    <li><a href="/marketplace/marketplace.html">Marketplace</a></li>
                    <li><a href="/howitworks/howitworks.html">How It Works</a></li>
                    <li><a href="/testimonial/testimonials.html">Testimonials</a></li>
                    <li><a href="#" id="authLink" onclick="handleAuthClick()">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="home" aria-label="Hero section for supplier platform">
        <div class="container hero-content">
            <h1>Trusted Suppliers for India's Street Food Vendors</h1>
            <p>Connecting street food heroes with verified, reliable suppliers for quality ingredients at fair prices</p>
            <div class="hero-buttons">
                <button class="btn btn-primary" onclick="openModal('supplierSearchModal')" aria-label="Find verified suppliers">Find Suppliers</button>
                <button class="btn btn-outline" onclick="openModal('supplierSignupModal')" aria-label="Sign up to become a supplier">Become a Supplier</button>
            </div>
        </div>
    </section>

    <!-- Modals (hidden by default) -->
    <div id="supplierSearchModal" class="modal" role="dialog" aria-hidden="true">
        <!-- Modal content for finding suppliers -->
    </div>

    <div id="supplierSignupModal" class="modal" role="dialog" aria-hidden="true">
        <!-- Modal content for supplier signup -->
    </div>

    <!-- Footer -->
    <footer>
        <!-- Footer content like contact info, links, etc. -->
    </footer>

    <script>
        // Show "Logout" if user_role exists, otherwise "Login"
        function updateAuthLink() {
            const authLink = document.getElementById("authLink");
            const role = localStorage.getItem("user_role"); 
            if (authLink) {
                authLink.textContent = role ? "Logout" : "Login";
            }
        }

        function handleAuthClick() {
            const role = localStorage.getItem("user_role");
            if (role) {
                // Logout: remove only the session role
                localStorage.removeItem("user_role");
                alert("You have been logged out.");
                // reload home so nav updates
                window.location.href = "/home/home.html";
            } else {
                // Go to login page
                window.location.href = "/auth/login.html";
            }
        }

        // Run on page load
        updateAuthLink();
    </script>
</body>
</html>
